spring.application.name=khieu

# Spring Datasource
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Config JWT
jwt.base64-secret=${JWT_BASE64_SECRET}
# 1day = 24h * 60m * 60s = 86400s
jwt.token-validity-in-seconds=${JWT_TOKEN_VALIDITY_IN_SECONDS}